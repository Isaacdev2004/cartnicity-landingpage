kind = "web"
previewPath = "/"
title = "Cartnicity Landing Page"
version = "1.0.0"
id = "artifacts/cartnicity"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20044

[services.development]
run = "pnpm --filter @workspace/cartnicity run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/cartnicity", "run", "build" ]
publicDir = "artifacts/cartnicity/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20044"
BASE_PATH = "/"
